version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: zakupki_postgres
    environment:
      POSTGRES_DB: zakupki_db
      POSTGRES_USER: zakupki_user
      POSTGRES_PASSWORD: zakupki_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: